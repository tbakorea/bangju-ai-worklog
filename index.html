<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5ef" />
    <title>Bangju AI Worklog</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="worklog-shell">
      <header class="worklog-header">
        <div>
          <p>Bangju Management Agent</p>
          <h1>Bangju AI Worklog</h1>
        </div>
        <button id="worklogAiButton" type="button">AI</button>
      </header>

      <nav class="worklog-tabs" aria-label="업무일지 메뉴">
        <button class="is-active" type="button" data-view="today">오늘</button>
        <button type="button" data-view="attendance">근태</button>
        <button type="button" data-view="management">경영</button>
        <button type="button" data-view="organization">조직</button>
        <button type="button" data-view="report">보고</button>
        <button type="button" data-view="projects">프로젝트</button>
        <button type="button" data-view="settings">설정</button>
      </nav>

      <section class="worklog-view is-active" id="view-today">
        <div class="employee-log-topbar">
          <strong>Bangju AI Work Log</strong>
          <div class="date-nav" aria-label="업무일지 날짜 이동">
            <button id="prevDateButton" type="button">어제</button>
            <button id="selectedDateButton" type="button"></button>
            <button id="nextDateButton" type="button">내일</button>
          </div>
        </div>
        <div class="worklog-title-row employee-title-row">
          <div>
            <h2 id="todayTitle"></h2>
            <label class="employee-picker">
              직원
              <select id="employeeSelect"></select>
            </label>
          </div>
        </div>
        <div class="clock-panel" aria-label="출퇴근 기록">
          <button id="clockInButton" type="button">출근</button>
          <label>
            출근시간
            <input id="clockInTime" type="time" />
          </label>
          <button id="clockOutButton" type="button">퇴근</button>
          <label>
            퇴근시간
            <input id="clockOutTime" type="time" />
          </label>
        </div>
        <div class="worklog-context-grid" id="todayContext"></div>
        <article class="planner-section">
          <h3>오늘의 우선업무</h3>
          <div class="priority-board" id="priorityBoard"></div>
        </article>
        <article class="planner-section">
          <div class="section-heading-row">
            <h3>시간별 일정</h3>
            <button id="addEntryButton" type="button">일정 추가</button>
          </div>
          <div class="worklog-entry-list" id="entryList"></div>
        </article>
        <article class="planner-section">
          <h3>업무보고</h3>
          <textarea id="employeeReport" rows="7" placeholder="오늘 진행한 업무, 완료사항, 이슈, 지원 요청을 보고 형식으로 정리합니다."></textarea>
        </article>
        <article class="planner-section">
          <h3>메모</h3>
          <textarea id="employeeMemo" rows="6" placeholder="회의 메모, 인수인계, 내일 확인할 내용을 자유롭게 적습니다."></textarea>
        </article>
      </section>

      <section class="worklog-view" id="view-attendance">
        <div class="worklog-title-row">
          <h2>근태관리</h2>
          <button type="button" id="addAttendanceButton">근태 기록 추가</button>
        </div>
        <div class="worklog-attendance-list" id="attendanceList"></div>
      </section>

      <section class="worklog-view" id="view-management">
        <h2>경영관리</h2>
        <div class="management-grid" id="managementGrid"></div>
      </section>

      <section class="worklog-view" id="view-organization">
        <h2>Bangju 조직 구조</h2>
        <div class="organization-tree" id="organizationTree"></div>
      </section>

      <section class="worklog-view" id="view-report">
        <h2>보고서 초안</h2>
        <textarea id="reportDraft" rows="12" placeholder="오늘의 업무를 바탕으로 보고서가 정리됩니다."></textarea>
      </section>

      <section class="worklog-view" id="view-projects">
        <h2>프로젝트 연결</h2>
        <p class="empty-note">업무일지와 연결할 프로젝트 목록을 이곳에서 관리합니다.</p>
      </section>

      <section class="worklog-view" id="view-settings">
        <h2>업무일지 설정</h2>
        <label>
          보고 스타일
          <select id="reportTone">
            <option value="executive">임원 보고형</option>
            <option value="team">팀 공유형</option>
            <option value="personal">개인 회고형</option>
          </select>
        </label>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
